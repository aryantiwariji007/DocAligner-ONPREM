name: doc-standards

services:
  backend:
    image: doc-standards-backend:1.0
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ../backend:/app/backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/docstandards
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - WATCHFILES_FORCE_POLLING=true
      - PYTHONPATH=/app
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen2.5:7b-instruct
      - QDRANT_URL=http://qdrant:6333
    ports:
      - "8001:8000"
    restart: always
    depends_on:
      - db
      - redis
      - minio
      - qdrant

  worker:
    image: doc-standards-worker:1.0
    build:
      context: ../backend
      dockerfile: ../docker/worker.Dockerfile
    command: celery -A backend.app.worker.celery_app worker --loglevel=info -Q celery,stage2-slow --concurrency=1
    volumes:
      - ../backend:/app/backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/docstandards
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - WATCHFILES_FORCE_POLLING=true
      - PYTHONPATH=/app
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen2.5:7b-instruct
      - QDRANT_URL=http://qdrant:6333
    restart: always
    depends_on:
      - db
      - redis
      - minio
      - qdrant

  frontend:
    image: doc-standards-frontend:1.0
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8001/api/v1
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001/api/v1
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: docstandards
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9005:9001"
    volumes:
      - minio_data:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

volumes:
  postgres_data:
  minio_data:
  qdrant_data:
